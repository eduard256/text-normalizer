<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Normalizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #111116;
            --bg-tertiary: #18181f;
            --bg-panel: #0e0e12;
            --border: #2a2a35;
            --border-focus: #4a4a5a;
            --text-primary: #e8e6e3;
            --text-secondary: #8a8a95;
            --text-muted: #55555f;
            --accent: #c4b5a0;
            --accent-dim: #8a7d6b;
            --accent-glow: rgba(196, 181, 160, 0.08);
            --success: #7a9a6a;
            --font-mono: 'IBM Plex Mono', 'Consolas', monospace;
            --font-display: 'Space Mono', monospace;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-mono);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle grain overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* Header */
        .header {
            padding: 28px 40px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 16px;
            flex-shrink: 0;
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .header-sep {
            color: var(--text-muted);
            font-size: 14px;
        }

        .header-desc {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .header-version {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* Main layout */
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 0;
        }

        /* Panels */
        .panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }

        .panel:first-child {
            border-right: 1px solid var(--border);
        }

        .panel-header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            background: var(--bg-secondary);
        }

        .panel-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
        }

        .panel-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s ease;
        }

        .panel-indicator.active {
            background: var(--success);
            box-shadow: 0 0 8px rgba(122, 154, 106, 0.4);
        }

        .panel-meta {
            margin-left: auto;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            font-variant-numeric: tabular-nums;
        }

        .panel-body {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: var(--bg-panel);
            color: var(--text-primary);
            border: none;
            outline: none;
            resize: none;
            padding: 20px 24px;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.7;
            letter-spacing: 0.01em;
            display: block;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        textarea:focus {
            background: var(--bg-tertiary);
        }

        .output-area {
            width: 100%;
            height: 100%;
            background: var(--bg-panel);
            color: var(--text-primary);
            padding: 20px 24px;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.7;
            letter-spacing: 0.01em;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            user-select: text;
        }

        .output-area.empty {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state-icon {
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 12px;
            line-height: 1.8;
        }

        /* Center divider with controls */
        .divider-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-action {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            border-color: var(--accent-dim);
            color: var(--accent);
            background: var(--bg-tertiary);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-action:active {
            transform: scale(0.95);
        }

        .btn-action svg {
            width: 16px;
            height: 16px;
        }

        .btn-action.primary {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .btn-action.primary:hover {
            background: var(--accent);
            box-shadow: 0 0 24px rgba(196, 181, 160, 0.2);
        }

        /* Footer / status bar */
        .footer {
            padding: 10px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-key {
            padding: 1px 6px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 10px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .footer-spacer {
            flex: 1;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-tertiary);
            border: 1px solid var(--border-focus);
            color: var(--text-primary);
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-size: 12px;
            border-radius: 6px;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-focus);
        }

        /* Responsive */
        @media (max-width: 800px) {
            .main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }

            .panel:first-child {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .divider-controls {
                top: auto;
                bottom: calc(50% - 22px);
                left: auto;
                right: 20px;
                transform: none;
                flex-direction: row;
            }

            .header {
                padding: 20px 20px 16px;
                flex-wrap: wrap;
            }

            .header-desc {
                display: none;
            }
        }

        /* Line numbers gutter effect on focus */
        textarea {
            background-image: linear-gradient(
                to right,
                var(--bg-tertiary) 0px,
                var(--bg-tertiary) 3px,
                transparent 3px
            );
            background-size: 100% 100%;
            background-repeat: no-repeat;
            transition: background-color 0.2s ease;
        }

        textarea:focus {
            background-image: linear-gradient(
                to right,
                var(--accent-dim) 0px,
                var(--accent-dim) 2px,
                transparent 2px
            );
        }
    </style>
</head>
<body>

    <header class="header">
        <span class="header-title">Text Normalizer</span>
        <span class="header-sep">/</span>
        <span class="header-desc">Strip excessive whitespace and indentation. Preserve content.</span>
        <span class="header-version">v1.0</span>
    </header>

    <main class="main">
        <div class="panel">
            <div class="panel-header">
                <div class="panel-indicator active" id="inputIndicator"></div>
                <span class="panel-label">Input</span>
                <span class="panel-meta" id="inputMeta">0 chars / 0 lines</span>
            </div>
            <div class="panel-body">
                <textarea id="input" placeholder="Paste text with messy whitespace here..." spellcheck="false"></textarea>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div class="panel-indicator" id="outputIndicator"></div>
                <span class="panel-label">Output</span>
                <span class="panel-meta" id="outputMeta">--</span>
            </div>
            <div class="panel-body">
                <div class="output-area empty" id="output">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-state-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                            </svg>
                        </div>
                        <div class="empty-state-text">
                            Paste text on the left<br>
                            Normalized output appears here
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="divider-controls">
            <button class="btn-action primary" id="btnNormalize" title="Normalize (Ctrl+Enter)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </button>
            <button class="btn-action" id="btnCopy" title="Copy output (Ctrl+Shift+C)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
            </button>
            <button class="btn-action" id="btnClear" title="Clear all">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-item">
            <span class="footer-key">Ctrl+Enter</span>
            <span>Normalize</span>
        </div>
        <div class="footer-item">
            <span class="footer-key">Ctrl+Shift+C</span>
            <span>Copy</span>
        </div>
        <span class="footer-spacer"></span>
        <div class="footer-item">
            <span class="status-dot"></span>
            <span>Ready</span>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const emptyStateEl = document.getElementById('emptyState');
        const inputMeta = document.getElementById('inputMeta');
        const outputMeta = document.getElementById('outputMeta');
        const inputIndicator = document.getElementById('inputIndicator');
        const outputIndicator = document.getElementById('outputIndicator');
        const btnNormalize = document.getElementById('btnNormalize');
        const btnCopy = document.getElementById('btnCopy');
        const btnClear = document.getElementById('btnClear');
        const toastEl = document.getElementById('toast');

        let toastTimer = null;

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
        }

        function updateInputMeta() {
            const val = inputEl.value;
            const chars = val.length;
            const lines = val ? val.split('\n').length : 0;
            inputMeta.textContent = chars + ' chars / ' + lines + ' lines';
        }

        /**
         * Normalize text:
         * - Remove common leading whitespace from each line
         * - Collapse runs of spaces/tabs within a line into single space
         * - Preserve line breaks structure
         * - Remove leading/trailing blank lines
         */
        function normalizeText(text) {
            if (!text.trim()) return '';

            let lines = text.split('\n');

            // Remove leading and trailing empty lines
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();

            // Find minimum indentation (ignoring empty lines)
            const nonEmptyLines = lines.filter(function(l) { return l.trim().length > 0; });
            let minIndent = Infinity;
            for (let i = 0; i < nonEmptyLines.length; i++) {
                var match = nonEmptyLines[i].match(/^(\s*)/);
                if (match) {
                    minIndent = Math.min(minIndent, match[1].length);
                }
            }
            if (minIndent === Infinity) minIndent = 0;

            // Strip common indentation and normalize internal whitespace
            var normalized = lines.map(function(line) {
                if (!line.trim()) return '';
                // Remove common leading whitespace
                var stripped = line.substring(minIndent);
                // Collapse multiple spaces/tabs into single space
                stripped = stripped.replace(/[ \t]+/g, ' ');
                // Trim trailing whitespace
                stripped = stripped.trimEnd();
                return stripped;
            });

            // Join lines: collapse consecutive blank lines into one
            var result = [];
            var prevEmpty = false;
            for (var i = 0; i < normalized.length; i++) {
                if (normalized[i] === '') {
                    if (!prevEmpty) {
                        result.push('');
                    }
                    prevEmpty = true;
                } else {
                    result.push(normalized[i]);
                    prevEmpty = false;
                }
            }

            return result.join('\n');
        }

        function showEmptyState() {
            outputEl.textContent = '';
            outputEl.classList.add('empty');
            outputEl.appendChild(emptyStateEl);
            emptyStateEl.style.display = '';
        }

        function doNormalize() {
            var raw = inputEl.value;
            if (!raw.trim()) {
                showToast('Nothing to normalize');
                return;
            }

            var result = normalizeText(raw);

            // Hide empty state and show result
            emptyStateEl.style.display = 'none';
            outputEl.classList.remove('empty');
            outputEl.textContent = result;
            outputIndicator.classList.add('active');

            var chars = result.length;
            var lines = result.split('\n').length;
            var saved = raw.length - result.length;
            outputMeta.textContent = chars + ' chars / ' + lines + ' lines / -' + saved + ' removed';

            showToast('Normalized');
        }

        function doCopy() {
            var text = outputEl.textContent;
            if (!text || outputEl.classList.contains('empty')) {
                showToast('Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(function() {
                showToast('Copied to clipboard');
            }).catch(function() {
                // Fallback for older browsers
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Copied to clipboard');
            });
        }

        function doClear() {
            inputEl.value = '';
            showEmptyState();
            outputIndicator.classList.remove('active');
            outputMeta.textContent = '--';
            updateInputMeta();
            inputEl.focus();
            showToast('Cleared');
        }

        // Event listeners
        inputEl.addEventListener('input', updateInputMeta);
        btnNormalize.addEventListener('click', doNormalize);
        btnCopy.addEventListener('click', doCopy);
        btnClear.addEventListener('click', doClear);

        // Auto-normalize on paste
        inputEl.addEventListener('paste', function() {
            setTimeout(doNormalize, 50);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                doNormalize();
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                doCopy();
            }
        });
    </script>
</body>
</html>
